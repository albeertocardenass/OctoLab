<div class="login-screen">
  <div class="login-container">
    <h2>Crear Cuenta</h2>
    <form (ngSubmit)="onRegister()">
      <input type="text" name="nombre" [(ngModel)]="registerData.nombre" placeholder="Nombre" required>
      <input type="text" name="apellido1" [(ngModel)]="registerData.apellido1" placeholder="Primer Apellido" required>
      <input type="text" name="apodo" [(ngModel)]="registerData.apodo" placeholder="Apodo (Nick)" required>
      <input type="email" name="email" [(ngModel)]="registerData.email" placeholder="Correo Electrónico" required>
      <input type="password" name="password" [(ngModel)]="registerData.password" placeholder="Contraseña" required>
      
      <button type="submit">Registrarse</button>
      <p style="color: red;" *ngIf="errorMessage">{{errorMessage}}</p>
      
      <p>¿Ya tienes cuenta? <a (click)="router.navigate(['/login'])" style="cursor:pointer; color: blue;">Inicia sesión</a></p>
    </form>
  </div>
</div>
