<div class="config-container fade-in">
  <div class="config-card">
    <div class="config-profile-header">
      <div class="avatar-container">
        <div class="avatar-wrapper">
          @if (avatarSrc && !avatarError) {
            <img [src]="avatarSrc" class="big-profile-img" alt="Avatar" (error)="onAvatarImgError()">
          } @else {
            <div class="big-profile-circle">
              {{ usuarioActivo?.nombre?.charAt(0)?.toUpperCase() || 'U' }}
            </div>
          }
          @if (subiendoAvatar) {
            <div class="avatar-loading">Subiendo...</div>
          }
        </div>
        <label class="btn-change-photo" for="avatarInput">
          {{ subiendoAvatar ? 'Subiendo...' : 'Cambiar foto' }}
        </label>
        <input id="avatarInput" type="file" accept="image/*" style="display:none"
               (change)="seleccionarImagen($event)">
      </div>
      <h2>{{ usuarioActivo?.nombre }}</h2>
      <span class="badge">{{ usuarioActivo?.rol }}</span>
    </div>

    <div class="config-form">
      <div class="form-group">
        <label>Nombre de Usuario</label>
        <input type="text" [(ngModel)]="usuarioActivo.nombre">
      </div>

      <div class="form-group">
        <label>Correo Electronico</label>
        <input type="email" [(ngModel)]="usuarioActivo.email">
      </div>

      <div class="form-group">
        <label>Nueva Contrasena</label>
        <input type="password" [(ngModel)]="usuarioActivo.password" placeholder="Escribe para cambiarla">
        <small class="help-text">Deja en blanco si no quieres cambiarla</small>
      </div>

      <button class="btn-save" (click)="guardarCambios()">
        Guardar cambios
      </button>

      @if (mensaje) {
        <p [class.error-msg]="error" [class.success-msg]="!error">{{ mensaje }}</p>
      }
    </div>
  </div>
</div>
