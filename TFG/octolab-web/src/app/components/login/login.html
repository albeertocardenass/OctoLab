<div class="login-wrapper">
  <div class="login-card">
    
    <div class="login-header">
      <h2>Iniciar Sesión</h2>
    </div>

    <div class="alert-error" *ngIf="errorMessage">
      {{ errorMessage }}
    </div>

    <form (ngSubmit)="onLogin()" #loginForm="ngForm">
      
      <div class="form-group">
        <input 
          type="email" 
          name="email" 
          [(ngModel)]="loginData.email" 
          placeholder="Correo Electrónico"
          required>
      </div>

      <div class="form-group">
        <div class="password-wrapper">
          <input 
            [type]="mostrarPassword ? 'text' : 'password'" 
            name="password" 
            [(ngModel)]="loginData.password" 
            placeholder="Contraseña"
            required>
          
          <button type="button" class="btn-eye" (click)="toggleMostrarPassword()" tabindex="-1">
            <span class="eye-icon">{{ mostrarPassword ? 'Ocultar' : 'Ver' }}</span>
          </button>
        </div>
      </div>

      <div class="remember-me">
        <label>
          <input type="checkbox" name="recuerdame" [(ngModel)]="recuerdame">
          Recuérdame en este equipo
        </label>
      </div>

      <button type="submit" class="btn-primary" [disabled]="!loginForm.form.valid">
        Entrar
      </button>

    </form>

    <div class="guest-section">
      <button type="button" class="btn-guest" (click)="entrarComoInvitado()">
        Entrar como Invitado
      </button>
    </div>

    <div class="login-footer">
      <p>¿No tienes cuenta? <a routerLink="/register">Regístrate aquí</a></p>
    </div>

  </div>
</div>
