<div class="login-screen">
  <div class="login-container">
    <h2>Iniciar Sesión</h2>
    <form (ngSubmit)="onLogin()">
      <input type="email" name="email" [(ngModel)]="loginData.email" placeholder="Email" required />
      
      <div class="password-wrapper">
        <input
          [type]="mostrarPassword ? 'text' : 'password'"
          name="password"
          [(ngModel)]="loginData.password"
          placeholder="Contraseña"
          required
        />
        <button type="button" class="toggle-password" (click)="mostrarPassword = !mostrarPassword">
          <svg *ngIf="!mostrarPassword" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
          <svg *ngIf="mostrarPassword" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
            <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
            <line x1="1" y1="1" x2="23" y2="23"/>
          </svg>
        </button>
      </div>

      <button type="submit">Entrar</button>
      <button type="button" (click)="entrarComoInvitado()">Entrar como Invitado</button>
      <p style="color: red" *ngIf="errorMessage">{{ errorMessage }}</p>
    </form>

    <p style="margin-top: 24px;">
      ¿No tienes cuenta?
      <a (click)="router.navigate(['/register'])" style="cursor: pointer; color: blue">Regístrate aquí</a>
    </p>
  </div>
</div>
