<div class="welcome-placeholder">
  <h2>Bienvenido, {{ usuarioActivo?.nombre }}</h2>
  <p>Últimas noticias de ciberseguridad</p>

  <div *ngIf="cargandoNoticias" style="color: #888; margin-top: 1rem">
    Cargando noticias...
  </div>

  <div class="noticias-grid" *ngIf="!cargandoNoticias">
    <a *ngFor="let noticia of noticias" [href]="noticia.enlace" target="_blank" class="noticia-card">
      <img 
        [src]="getImagenUrl(noticia.imagen)" 
        class="noticia-img" 
        (error)="$any($event.target).src = 'assets/default-news.png'" 
      />
      <div class="noticia-info">
        <span class="noticia-fecha">{{ noticia.fecha | date: 'dd MMM yyyy' }}</span>
        <h3>{{ noticia.titulo }}</h3>
      </div>
    </a>
  </div>

  <div *ngIf="!cargandoNoticias && noticias.length === 0" style="color: #888; margin-top: 1rem">
    No se pudieron cargar las noticias. Inténtalo más tarde.
  </div>
</div>
