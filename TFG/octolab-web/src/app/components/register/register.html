<div class="login-wrapper">
  <div class="login-card">
    
    <div class="login-header">
      <h2>Crear Cuenta</h2>
    </div>

    <form (ngSubmit)="onRegister()" #registerForm="ngForm">
      
      <div class="form-group">
        <input type="text" name="nombre" [(ngModel)]="registerData.nombre" placeholder="Nombre" required>
      </div>
      
      <div class="form-group">
        <input type="text" name="apellido1" [(ngModel)]="registerData.apellido1" placeholder="Primer Apellido" required>
      </div>

      <div class="form-group">
        <input type="text" name="apellido2" [(ngModel)]="registerData.apellido2" placeholder="Segundo Apellido">
      </div>

      <div class="form-group">
        <input type="text" name="apodo" [(ngModel)]="registerData.apodo" placeholder="Apodo (Nick)" required>
      </div>

      <div class="form-group">
        <input type="email" name="email" [(ngModel)]="registerData.email" placeholder="Correo Electrónico" required>
      </div>
      <div class="form-group">
        <div class="password-wrapper">
          <input
            [type]="mostrarPassword ? 'text' : 'password'"
            name="password"
            [(ngModel)]="registerData.password"
            placeholder="Contraseña"
            required
            minlength="6"
          />
          <button type="button" class="btn-eye" (click)="mostrarPassword = !mostrarPassword" tabindex="-1">
            <span class="eye-icon">{{ mostrarPassword ? 'Ocultar' : 'Ver' }}</span>
          </button>
        </div>
      </div>

      <div class="form-group">
        <div class="password-wrapper">
          <input
            [type]="mostrarConfirmar ? 'text' : 'password'"
            name="confirmarPassword"
            [(ngModel)]="confirmarPassword"
            placeholder="Confirmar Contraseña"
            required
          />
          <button type="button" class="btn-eye" (click)="mostrarConfirmar = !mostrarConfirmar" tabindex="-1">
            <span class="eye-icon">{{ mostrarConfirmar ? 'Ocultar' : 'Ver' }}</span>
          </button>
        </div>
      </div>
      
      <div class="alert-error" *ngIf="confirmarPassword && registerData.password !== confirmarPassword" style="color: red; text-align: center; margin-bottom: 15px;">
        Las contraseñas no coinciden
      </div>

      <button type="submit" class="btn-primary" [disabled]="registerForm.invalid || registerData.password !== confirmarPassword">
        Registrarse
      </button>

      <div class="alert-error" *ngIf="errorMessage" style="color: red; text-align: center; margin-top: 15px;">
        {{errorMessage}}
      </div>

      <div class="login-footer" style="margin-top: 20px; text-align: center;">
        <p>¿Ya tienes cuenta? <a (click)="router.navigate(['/login'])" style="cursor:pointer; color: #5548d9;">Inicia sesión</a></p>
      </div>
    </form>
  </div>
</div>
