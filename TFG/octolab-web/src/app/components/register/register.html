<div class="login-screen">
  <div class="login-container">
    <h2>Crear Cuenta</h2>
<form (ngSubmit)="onRegister()" #registerForm="ngForm">
  <input type="text" name="nombre" [(ngModel)]="registerData.nombre" placeholder="Nombre" required>
  <input type="text" name="apellido1" [(ngModel)]="registerData.apellido1" placeholder="Primer Apellido" required>
  <input type="text" name="apellido2" [(ngModel)]="registerData.apellido2" placeholder="Segundo Apellido">
  <input type="text" name="apodo" [(ngModel)]="registerData.apodo" placeholder="Apodo (Nick)" required>
  <input type="email" name="email" [(ngModel)]="registerData.email" placeholder="Correo Electrónico" required>


      <div class="password-wrapper">
        <input
          [type]="mostrarPassword ? 'text' : 'password'"
          name="password"
          [(ngModel)]="registerData.password"
          placeholder="Contraseña"
          required
          minlength="6"
        />
        <button type="button" class="toggle-password" (click)="mostrarPassword = !mostrarPassword">
          <svg *ngIf="!mostrarPassword" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
          <svg *ngIf="mostrarPassword" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
            <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
            <line x1="1" y1="1" x2="23" y2="23"/>
          </svg>
        </button>
      </div>

      <div class="password-wrapper">
        <input
          [type]="mostrarConfirmar ? 'text' : 'password'"
          name="confirmarPassword"
          [(ngModel)]="confirmarPassword"
          placeholder="Confirmar Contraseña"
          required
        />
        <button type="button" class="toggle-password" (click)="mostrarConfirmar = !mostrarConfirmar">
          <svg *ngIf="!mostrarConfirmar" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
          <svg *ngIf="mostrarConfirmar" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
            <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
            <line x1="1" y1="1" x2="23" y2="23"/>
          </svg>
        </button>
      </div>
      <p style="color: red; font-size: 0.85rem; margin: 4px 0 0;" 
         *ngIf="confirmarPassword && registerData.password !== confirmarPassword">
        Las contraseñas no coinciden
      </p>

      <button type="submit" [disabled]="registerForm.invalid || registerData.password !== confirmarPassword">
        Registrarse
      </button>
      <p style="color: red;" *ngIf="errorMessage">{{errorMessage}}</p>

      <p>¿Ya tienes cuenta? <a (click)="router.navigate(['/login'])" style="cursor:pointer; color: blue;">Inicia sesión</a></p>
    </form>
  </div>
</div>
