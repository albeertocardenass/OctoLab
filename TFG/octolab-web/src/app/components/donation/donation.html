<div class="donation-wrapper fade-in">
  <div class="donation-container">

    @if (mensajeExito) {
      <div class="estado-card exito">
        <div class="estado-icon">✓</div>
        <h3>¡Gracias por tu apoyo!</h3>
        <p>{{ mensajeExito }}</p>
      </div>
    } @else {
      <div class="donation-header">
        <h2>Apoya el Proyecto</h2>
        <p>OctolabWeb es gratuito gracias a personas como tú.</p>
      </div>

      <div class="options">
        <button class="btn-tier" [class.selected]="cantidadFinal === 5 && !cantidadPersonalizada"
          (click)="seleccionarCantidad(5)">5€</button>
        <button class="btn-tier" [class.selected]="cantidadFinal === 15 && !cantidadPersonalizada"
          (click)="seleccionarCantidad(15)">15€</button>
        <button class="btn-tier" [class.selected]="cantidadFinal === 50 && !cantidadPersonalizada"
          (click)="seleccionarCantidad(50)">50€</button>
      </div>

      <div class="custom-amount">
        <label>O introduce una cantidad personalizada</label>
        <div class="input-euro">
          <span class="euro-prefix">€</span>
          <input type="tel" inputmode="numeric" pattern="[0-9]*"
                 [(ngModel)]="cantidadPersonalizada"
                 placeholder="0" min="1" />
        </div>
      </div>

      <div class="resumen">
        Total: <strong>{{ cantidadFinal }}€</strong>
      </div>

      <button class="btn-donar" (click)="iniciarPago()" [disabled]="pagando">
        {{ pagando ? 'Procesando...' : 'Continuar al pago →' }}
      </button>

      @if (mensajeError) {
        <p class="error">{{ mensajeError }}</p>
      }
    }

  </div>
</div>
