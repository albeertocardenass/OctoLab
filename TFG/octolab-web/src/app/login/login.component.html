<div class="login-screen">
  <div class="login-container">
    <h2>Iniciar Sesión</h2>
    <form (submit)="$event.preventDefault()">
      <input type="text" placeholder="Usuario (admin)">
      <input type="password" placeholder="Contraseña (1234)">
      <button type="button" (click)="onLogin()">Entrar</button>
    </form>
  </div>
</div>
