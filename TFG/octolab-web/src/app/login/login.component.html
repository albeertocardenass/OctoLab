<div class="login-screen">
  <div class="login-container">
    <h2>Iniciar Sesión</h2>
    <form (ngSubmit)="onLogin()">
      <input type="email" name="email" [(ngModel)]="loginData.email" placeholder="Email" required>
      <input type="password" name="password" [(ngModel)]="loginData.password" placeholder="Contraseña" required>
      <button type="submit">Entrar</button>
      <p style="color: red;" *ngIf="errorMessage">{{errorMessage}}</p>
    </form>

    <p>¿No tienes cuenta? <a (click)="router.navigate(['/register'])" style="cursor:pointer; color: blue;">Regístrate aquí</a></p>
  </div>
</div>
