<div class="dashboard-container">
  <header class="top-bar">
    <div class="logo" [routerLink]="['/home']" style="cursor: pointer;">
      Octolab<span>Web</span>
    </div>
    
    <div class="user-profile">
      <div class="user-info">
        <span class="username">Admin</span>
        <span class="role">Administrador</span>
      </div>
      <div class="profile-circle">A</div>
    </div>
  </header>
  <main class="content-wrapper">
    <nav class="tab-bar">
      <a routerLink="inicio" routerLinkActive="active" class="tab-item">Inicio</a>
      <a routerLink="temario" routerLinkActive="active" class="tab-item">Temario</a>
      <a routerLink="comunidad" routerLinkActive="active" class="tab-item">Comunidad</a>
      <a routerLink="donaciones" routerLinkActive="active" class="tab-item">Donaciones</a>
      <a routerLink="configuracion" routerLinkActive="active" class="tab-item">Configuración</a>
    </nav>

    <section class="main-viewport">
      <div *ngIf="router.url === '/home'" class="welcome-placeholder">
        <h2>Bienvenido a OctolabWeb</h2>
        <p>Selecciona una sección en el menú superior para comenzar.</p>
        <div class="logo-watermark">O</div>
      </div>

      <router-outlet></router-outlet>
    </section>
  </main>
</div>
